server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prbot_db
    username: username
    password: password
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379
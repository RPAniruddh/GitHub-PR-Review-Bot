server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prbot_db
    username: username
    password: password
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379

app:
  github:
    webhook-secret: giythub-secret
    api-token: your-github-pat-token
    api-url: https://api.github.com
  openai:
    api-key: api-key
    model: gpt-4
    url: https://api.openai.com/v1/chat/completions
